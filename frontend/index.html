<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Scheduler</title>
  <link rel="stylesheet" href="style.css"></link>
</head>
<body>

<div class="app">
  <div class="timeline-panel">
    <div class="timeline-header">
      <h2 id="cal-date"></h2>
      <p>Daily schedule</p>
      <button id="print-btn">Print ⎙</button>
    </div>
    <div class="timeline-scroll" id="timeline-scroll">
      <div class="timeline-grid" id="timeline-grid"></div>
      <div class="events-layer" id="events-layer"></div>
    </div>
  </div>

  <div class="form-panel">
    <div class="form-header"><h2>Add event</h2></div>
    <div class="form-body">
      <div class="field">
        <div class="field-label-row">
          <label>Event name</label>
          <div id="free-block-row">
            <label style="font-size: 11px;">Free block</label>
            <input type="checkbox" id="free-block-checkbox" />
          </div>
        </div>
        <input type="text" id="ev-name" maxlength="60" />
      </div>
      <div class="field">
        <label>Start time</label>
        <input type="time" id="ev-start" value="09:00" />
      </div>
      <div class="field">
        <label>End time</label>
        <input type="time" id="ev-end" value="10:00" />
      </div>
      <div class="error-msg" id="error-msg"></div>
      <button class="add-btn" id="add-btn">+ Add to calendar</button>

      <div class="field">
        <label>Shelter Events</label>
        <div id="shelter-events-container">
          <div style="font-size: 12px; color: #888780; text-align: center; padding: 20px;">Loading events...</div>
        </div>
      </div>

      <div class="field">
        <button id="free-block-btn" style="padding: 8px; font-size: 12px; cursor: pointer; background: none; border: 1px solid #d3d1c7; border-radius: 6px;">Schedule free blocks</button>
      </div>
    </div>
  </div>
</div>

<div id="free-block-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center;">
  <div style="background: #fff; width: 340px; border-radius: 12px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative;">
    <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 8px;">Schedule Free Blocks</h3>
    <p style="font-size: 13px; color: #5f5e5a; margin-bottom: 20px; line-height: 1.5;">
      Would you like to automatically fill gaps in your schedule with "Free Block" periods?
    </p>
    
    <div style="display: flex; flex-direction: column; gap: 10px;">
      <button id="confirm-free-blocks" style="width: 100%; padding: 10px; background: #1c1c1a; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer;">Generate Blocks</button>
      <button id="close-modal" style="width: 100%; padding: 10px; background: #fff; color: #5f5e5a; border: 1px solid #d3d1c7; border-radius: 8px; font-size: 13px; cursor: pointer;">Cancel</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
