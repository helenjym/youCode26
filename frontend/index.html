<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Scheduler</title>
  <link rel="stylesheet" href="style.css"></link>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
   <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
  <div class="container-fluid">
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="http://127.0.0.1:5500/frontend/index.html">Scheduler</a>
        </li>
        <li class="nav-item">
          <a class="nav-link"  href="http://127.0.0.1:5500/frontend/employment.html">Resources</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="app">
  <div class="timeline-panel">
<div class="timeline-header">
  <h2 id="cal-date"></h2>
  <p>Daily schedule</p>
  <div style="display: flex; gap: 8px;">
    <button id="print-btn">Print ⎙</button>
    <!-- <button id="reset-btn" class="btn btn-light" >Reset 🗑️</button> -->
  </div>
</div>
    <div class="timeline-scroll" id="timeline-scroll">
      <div class="timeline-grid" id="timeline-grid"></div>
      <div class="events-layer" id="events-layer"></div>
    </div>
  </div>

  <div class="form-panel">
    <div class="form-header"><h2>Add event</h2></div>
    <div class="form-body">
      <div class="field">
        <div class="field-label-row">
          <label>Event name</label>
          <div id="free-block-row">
            <label style="font-size: 11px;">Free block</label>
            <input type="checkbox" id="free-block-checkbox" />
          </div>
        </div>
        <input type="text" id="ev-name" maxlength="60" />
      </div>
      <div class="field">
        <label>Start time</label>
        <input type="time" id="ev-start" value="09:00" />
      </div>
      <div class="field">
        <label>End time</label>
        <input type="time" id="ev-end" value="10:00" />
      </div>
      <div class="error-msg" id="error-msg"></div>
      <button class="add-btn" id="add-btn">+ Add to calendar</button>

      <div class="field">
        <label>Shelter Events</label>
        <div id="shelter-events-container">
          <div style="font-size: 12px; color: #888780; text-align: center; padding: 20px;">Loading events...</div>
        </div>
      </div>

      <div class="field">
        <button id="free-block-btn" style="padding: 8px; font-size: 12px; cursor: pointer; background: none; border: 1px solid #d3d1c7; border-radius: 6px;">Schedule free blocks</button>
      </div>
    </div>
  </div>
</div>

<div id="free-block-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center;">
  <div style="background: #fff; width: 500px; border-radius: 12px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative;">
    
    <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">Schedule Free Blocks</h3>

    <!-- Activity cards will appear here -->
    <div id="activity-list" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px;"></div>

    <!-- Add activity form (hidden by default) -->
    <div id="add-activity-form" style="display: none; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; margin-bottom: 16px;">
      <div class="mb-3">
        <label class="form-label" style="font-size: 14px; font-weight: 500;">Activity</label>
        <input type="text" id="activity-input" class="form-control form-control-sm" placeholder="Enter activity name" list="activity-suggestions">
        <datalist id="activity-suggestions">
          <option value="Job Search">
          <option value="Exercise">
          <option value="Community Centre">
          <option value="Reading">
          <option value="Meditation">
          <option value="Groceries">
          <option value="Technology Program">
          <option value="Recreational Program">
        </datalist>
      </div>
      <div class="mb-3">
        <label class="form-label" style="font-size: 14px; font-weight: 500;">Priority</label>
        <select id="priority-input" class="form-select form-select-sm">
          <option value="" disabled selected>Select priority</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>
      <div style="display: flex; gap: 8px;">
        <button onclick="confirmAddActivity()" class="btn btn-sm btn-dark">Confirm</button>
        <button onclick="cancelAddActivity()" class="btn btn-sm btn-outline-secondary">Cancel</button>
      </div>
    </div>

    <!-- Add activity button -->
    <button id="add-activity-btn" onclick="showAddActivityForm()" class="btn btn-sm btn-outline-dark w-100">+ Add Activity</button>

    <div style="display: flex; justify-content: flex-end; margin-top: 16px;">
      <button onclick="closeFreeBlockModal()" class="btn btn-sm btn-dark">Done</button>
    </div>
  </div>
</div>

<script src="popup.js"></script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
